version: 2
updates:
  # Maintain Node.js backend dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Maintain Node.js frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Maintain Python FastAPI dependencies
  - package-ecosystem: "pip"
    directory: "/ai-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Maintain Docker images tags
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
