name: HireSense AI CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-node-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-node-

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Validate Prisma Schema
        run: |
          cd backend
          npx prisma validate

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Run ESLint
        run: |
          cd backend
          npx eslint . --ext ts --max-warnings 100

      - name: Run TypeScript Compile Check
        run: |
          cd backend
          npx tsc --noEmit

      - name: Run Unit Tests
        run: |
          cd backend
          npm run test

      - name: Build Backend
        run: |
          cd backend
          npm run build

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . --ext ts,tsx --max-warnings 100

      - name: Run TypeScript Compile Check
        run: |
          cd frontend
          npx tsc --noEmit --noUnusedLocals false

      - name: Run Unit Tests
        run: |
          cd frontend
          npm run test

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  ai-service-ci:
    name: AI Service CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache Pip Packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt

      - name: Run Python Syntax Compile check
        run: |
          cd ai-service
          python -m py_compile app/main.py app/features/**/*.py

  docker-build-ci:
    name: Docker Builds Verification
    runs-on: ubuntu-latest
    needs: [ backend-ci, frontend-ci, ai-service-ci ]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Verify Backend Docker Build
        run: |
          docker build --target production -t hiresense-backend:latest ./backend

      - name: Verify AI Service Docker Build
        run: |
          docker build --target production -t hiresense-ai-service:latest ./ai-service

      - name: Verify Frontend Docker Build
        run: |
          docker build --target production -t hiresense-frontend:latest ./frontend
