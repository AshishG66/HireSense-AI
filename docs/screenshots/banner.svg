<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240" style="background:#0b0f19; border-radius:12px; font-family:'Outfit', 'Public Sans', sans-serif;">
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: #00B8D9 }
    }
    .title {
      font-size: 48px;
      font-weight: 800;
      fill: url(#titleGradient);
      letter-spacing: -1.5px;
    }
    .tagline {
      font-size: 18px;
      fill: #919EAB;
      font-weight: 500;
    }
    .typing-text {
      font-size: 16px;
      fill: #00B8D9;
      font-weight: 600;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #00B8D9;
      animation: typing 4s steps(40, end) infinite, blink-caret .75s step-end infinite;
    }
    .logo-container {
      animation: pulse 4s ease-in-out infinite;
      transform-origin: 100px 120px;
    }
  </style>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0b0f19" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00A76F" />
      <stop offset="50%" stop-color="#00B8D9" />
      <stop offset="100%" stop-color="#8E33FF" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A76F" />
      <stop offset="100%" stop-color="#00B8D9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="12"/>

  <!-- Logo Group -->
  <g class="logo-container" transform="translate(10, 0)">
    <circle cx="100" cy="120" r="50" fill="none" stroke="url(#logoGradient)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="100" cy="120" r="38" fill="#141a21" />
    <!-- AI Brain nodes -->
    <path d="M 88,110 Q 100,92 112,110 T 112,130 Q 100,148 88,130 Z" fill="none" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="100" y2="140" stroke="url(#logoGradient)" stroke-width="2"/>
    <line x1="85" y1="120" x2="115" y2="120" stroke="url(#logoGradient)" stroke-width="2"/>
    <circle cx="100" cy="100" r="4" fill="#8E33FF" />
    <circle cx="100" cy="140" r="4" fill="#00B8D9" />
    <circle cx="85" cy="120" r="4" fill="#00A76F" />
    <circle cx="115" cy="120" r="4" fill="#22C55E" />
  </g>

  <!-- Typography -->
  <g transform="translate(180, 85)">
    <text x="0" y="0" class="title">HireSense AI</text>
    <text x="0" y="32" class="tagline">Enterprise-grade AI Recruitment &amp; Automated Interviewing</text>
    <g transform="translate(0, 52)">
      <text x="0" y="20" class="typing-text">✓ Real-time Interview Sandbox &amp; Resume Optimization...</text>
    </g>
  </g>
</svg>
